<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Test - Medical Authority</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Storage Access Test</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type) {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test 1: Check if localStorage is accessible
        try {
            localStorage.setItem('test', 'test');
            localStorage.removeItem('test');
            addResult('✅ localStorage: Accessible', 'success');
        } catch (error) {
            addResult('❌ localStorage: ' + error.message, 'error');
        }
        
        // Test 2: Check if sessionStorage is accessible
        try {
            sessionStorage.setItem('test', 'test');
            sessionStorage.removeItem('test');
            addResult('✅ sessionStorage: Accessible', 'success');
        } catch (error) {
            addResult('❌ sessionStorage: ' + error.message, 'error');
        }
        
        // Test 3: Test memory storage
        try {
            let memoryStorage = {};
            memoryStorage.test = 'value';
            const value = memoryStorage.test;
            addResult('✅ Memory storage: Working', 'success');
        } catch (error) {
            addResult('❌ Memory storage: ' + error.message, 'error');
        }
        
        addResult('ℹ️ If localStorage/sessionStorage show errors, this is normal in restricted environments', 'info');
        addResult('ℹ️ The main application uses memory storage as a fallback', 'info');
        
        // Test 4: Try to access main app
        setTimeout(() => {
            addResult('🔗 Testing main application...', 'info');
            fetch('http://localhost:3000')
                .then(response => {
                    if (response.ok) {
                        addResult('✅ Main application: Accessible', 'success');
                    } else {
                        addResult('❌ Main application: Error ' + response.status, 'error');
                    }
                })
                .catch(error => {
                    addResult('❌ Main application: ' + error.message, 'error');
                });
        }, 1000);
    </script>
</body>
</html>
